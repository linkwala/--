<style>
*{box-sizing:border-box}
body{
 margin:0;
 font-family:Arial,Helvetica,sans-serif;
 background:linear-gradient(135deg,#020617,#0f172a);
 color:white;
 display:flex;
 justify-content:center;
}

.wrapper{
 width:100%;
 max-width:420px;
 padding:15px;
}

h1{
 text-align:center;
 margin-bottom:15px;
}

.search-box{
 margin-bottom:20px;
}

.search-box input{
 width:100%;
 padding:12px;
 border-radius:12px;
 border:none;
 font-size:16px;
}

.post-list{
 display:flex;
 flex-direction:column;
 gap:20px;
}

.card{
 background:#0f172a;
 border-radius:20px;
 padding:18px;
 box-shadow:0 15px 35px rgba(0,0,0,0.6);
 transition:.3s;
}

.card:hover{
 transform:scale(1.03);
}

.card img{
 width:100%;
 border-radius:14px;
 margin-bottom:12px;
}

.post-title{
 text-align:center;
 margin-bottom:15px;
}

.btn{
 display:block;
 text-align:center;
 padding:14px;
 margin:10px 0;
 border-radius:12px;
 font-weight:bold;
 text-decoration:none;
}

.preview{background:linear-gradient(45deg,#ff7a00,#ff0058);} 
.download{background:#00ffa6;color:black;} 
.follow{background:#1e293b;} 

.footer{
 text-align:center;
 margin-top:25px;
 font-size:14px;
 opacity:.9;
}

.footer a{
 color:#00ffa6;
 text-decoration:none;
 font-weight:bold;
}

</style>
</head>

<body>

<div class="wrapper">

<h1>🔥 Video Hub</h1>

<div class="search-box">
<input type="text" placeholder="Search videos...">
</div>

<div class="post-list">

<!-- ================= POST 1 ================= -->

<div class="card">

<h3 class="post-title">Post Title 1</h3>

<!-- Image from your images folder -->
<a href="VIDEO_LINK" target="_blank">
<img src="photo1.jpg" alt="Video Thumbnail">
</a>

<a class="btn preview" href="VIDEO_LINK" target="_blank">▶ Preview Clip</a>

<a class="btn download" href="VIDEO_LINK" target="_blank">🔓 Unlock Full Video</a>

<a class="btn follow" href="INSTAGRAM_LINK" target="_blank">📸 Follow for More</a>

</div>
